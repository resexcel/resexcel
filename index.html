        const getAvatarGradient = (name) => {
            const colors = [
                'from-blue-400 to-indigo-500', 'from-emerald-400 to-teal-500', 'from-orange-400 to-rose-500',
                'from-purple-400 to-fuchsia-500', 'from-cyan-400 to-blue-500', 'from-pink-400 to-rose-500',
                'from-amber-400 to-orange-500'
            ];
            let hash = 0;
            for (let i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
            return colors[Math.abs(hash) % colors.length];
        };

                    }
                };
                authenticate();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if(!currentUser) setIsLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. SYNCHRONISATION DES DONNÉES EN TEMPS RÉEL
            useEffect(() => {
                if (!user) return;

                const contactsCol = collection(db, 'artifacts', canvasAppId, 'public', 'data', 'contacts');
                const caCol = collection(db, 'artifacts', canvasAppId, 'public', 'data', 'ca_declarations');

                // Écoute des contacts
                const unsubContacts = onSnapshot(contactsCol, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ ...doc.data(), firebaseId: doc.id }));
                    
                    // Injection automatique à la première ouverture si vide
                    if (data.length === 0 && !window.hasSeededFirebase) {
                        window.hasSeededFirebase = true;
                        
                        // Injection sécurisée
                        Promise.all(initialContacts.map(c => setDoc(doc(contactsCol, c.id.toString()), c)))
                            .then(() => console.log("Membres injectés avec succès !"))
                            .catch(err => {
                                console.error("Erreur d'écriture :", err);
                                setFirebaseError("Firebase bloque l'écriture. Allez dans l'onglet 'Règles' (Rules) de Firestore pour les mettre à jour.");
                            });
                    } else {
                        setContacts(data.sort((a, b) => a.name.localeCompare(b.name)));
                        setIsLoading(false);
                    }
                }, (error) => {
                    console.error("Impossible de lire Firestore:", error);
                    setFirebaseError("Firebase bloque la lecture. Allez dans l'onglet 'Règles' (Rules) de Firestore pour les mettre à jour.");
                    setIsLoading(false);
                });

                // Écoute des déclarations de CA
                const unsubCA = onSnapshot(caCol, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ ...doc.data(), firebaseId: doc.id }));
                    setDeclarationsCA(data.sort((a, b) => b.id - a.id));
                }, (err) => console.error("Erreur lecture CA:", err));

                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Montant du CA généré (€) *</label>
                                            <input required type="number" min="0" step="1" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none bg-slate-50 focus:bg-white m-0 text-base" value={caAmount} onChange={e => setCaAmount(e.target.value)} placeholder="Ex: 1500" />
                                        </div>
                                    </form>
                                </div>
                                <div className="px-5 py-4 border-t border-slate-100 bg-slate-50 flex justify-end space-x-3">
                                    <button type="button" onClick={() => setShowDeclareCAModal(false)} className="px-5 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:bg-slate-200 transition-colors border-none cursor-pointer">Annuler</button>
                                    <button type="submit" form="declareCAForm" className="px-5 py-2.5 rounded-xl text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm hover:shadow transition-all border-none cursor-pointer">Confirmer la déclaration</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Gestion des déclarations CA (Admin uniquement) */}
                    {showManageCAModal && isAdmin && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowManageCAModal(false)} style={{margin:0}}>
                            <div className="bg-white rounded-2xl sm:rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col m-0" onClick={e => e.stopPropagation()}>
                                <div className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                    <h3 className="text-lg font-bold text-slate-900 flex items-center gap-2 m-0">
                                        <i className="fa-solid fa-list-check text-indigo-600"></i> Historique du CA du réseau
                                    </h3>
                                    <button onClick={() => setShowManageCAModal(false)} className="text-slate-400 hover:text-slate-600 bg-white rounded-full w-8 h-8 flex items-center justify-center shadow-sm border-none cursor-pointer">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1">
                                    {declarationsCA.length === 0 ? (
                                        <p className="text-center text-slate-500 py-8 m-0">Aucune déclaration enregistrée.</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {declarationsCA.map(decl => (
                                                <div key={decl.firebaseId || decl.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                                                    <div>
                                                        <p className="font-bold text-slate-900 m-0 text-sm sm:text-base">{decl.amount.toLocaleString('fr-FR')} €</p>
                                                        <p className="text-xs text-slate-500 m-0 mt-1">Par: {decl.memberName} • {decl.date}</p>
                                                    </div>
                                                    <button onClick={(e) => handleDeleteCA(decl.firebaseId || decl.id, e)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors border-none bg-transparent cursor-pointer" title="Supprimer">
                                                        <i className="fa-solid fa-trash"></i>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Login Admin */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowLoginModal(false)} style={{margin:0}}>
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden m-0" onClick={e => e.stopPropagation()}>
                                <div className="p-6">
                                    <h3 className="text-xl font-bold text-slate-900 mb-4 m-0 text-center">Gestion de l'annuaire</h3>
                                    <form onSubmit={handleLogin} className="space-y-4 m-0">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Mot de passe de gestion</label>
                                            <input required type="password" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none m-0 text-base" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} placeholder="Saisir le mot de passe..." />
                                            {loginError && <p className="text-red-500 text-xs mt-2 m-0 font-medium">Mot de passe incorrect</p>}
                                        </div>
                                        <button type="submit" className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition-colors border-none cursor-pointer text-base shadow-sm">
                                            Se connecter
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('resexcel-root'));
        root.render(<App />);
    </script>
</body>
</html>
