        { id: "20", company: "SARL CHARNOLÉ SINGER",               name: "Robin SINGER",        phone: "06 32 17 77 65",                    email: "cjs@huissier-justice.fr",               activity: "Commissaire de justice (Huissier)",                                             website: "https://www.etude-cjs.com",                                                   sector: "Juridique & Conseil",         avatarUrl: "", logoUrl: "" },
        { id: "21", company: "MENUISERIE SAVOURÉ",                  name: "Sabrina SAVOURÉ",     phone: "02 99 44 91 21 / 06 07 38 42 52",   email: "menuiseriesavoure.contact@gmail.com",   activity: "Menuiserie et isolation, en rénovation et neuf",                                website: "https://www.menuiseriesavoure.com",                                            sector: "Artisanat & Bâtiment",        avatarUrl: "", logoUrl: "" },
        { id: "22", company: "BOLLORE MAINGUET",                   name: "Séverine MESLIN",     phone: "06 74 95 29 13",                    email: "s.meslin@bollore-mainguet.fr",          activity: "Expertise comptable",                                                           website: "https://www.bollore-mainguet.com",                                             sector: "Finance & Assurance",         avatarUrl: "", logoUrl: "" },
        { id: "23", company: "PROSPACTIVE",                        name: "Xavier VOZELLE",      phone: "07 44 92 37 60",                    email: "xavier.vozelle@prospactive.com",        activity: "Développement commercial externalisé",                                           website: "http://www.prospactive.com",                                                   sector: "Services aux entreprises",    avatarUrl: "", logoUrl: "" },
        { id: "24", company: "LE PETIT DIAGNOSTIQUEUR",            name: "Ludovic COLIN",       phone: "06 71 12 57 05",                    email: "contact@lepetitdiagnostiqueur.fr",      activity: "Diagnostic immobilier",                                                         website: "https://www.lepetitdiagnostiqueur.fr/",                                        sector: "Immobilier",                  avatarUrl: "", logoUrl: "" },
    ];

    const PREDEFINED_SECTORS = [
        "Artisanat & Bâtiment", "Bien-être & Coaching", "Communication", "Commerce & Vente",
        "Finance & Assurance", "Immobilier", "Juridique & Conseil", "Loisirs & Sport",
        "Services aux entreprises", "Automobile & Transport", "Autre"
    ];

    const EMPTY_CONTACT = { name: '', company: '', phone: '', email: '', activity: '', website: '', sector: 'Artisanat & Bâtiment', avatarUrl: '', logoUrl: '' };

    // ─── UTILITAIRES ──────────────────────────────────────────────────────────────
    const getAvatarGradient = (name = '') => {
        const colors = [
            'from-blue-400 to-indigo-500', 'from-emerald-400 to-teal-500', 'from-orange-400 to-rose-500',
            'from-purple-400 to-fuchsia-500', 'from-cyan-400 to-blue-500', 'from-pink-400 to-rose-500', 'from-amber-400 to-orange-500'
        ];
        let hash = 0;
        for (let i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
        return colors[Math.abs(hash) % colors.length];
    };

    const getContactIcon = (activity = '', size = 'text-2xl') => {
        const a = activity.toLowerCase();
        if (a.includes('coaching') || a.includes('bilan'))          return <i className={`fa-solid fa-user-check ${size}`}></i>;
        if (a.includes('communication') || a.includes('photo'))     return <i className={`fa-solid fa-camera ${size}`}></i>;
        if (a.includes('bien-être') || a.includes('amincissement')) return <i className={`fa-solid fa-heart ${size}`}></i>;
        if (a.includes('gestion') || a.includes('comptable'))       return <i className={`fa-solid fa-calculator ${size}`}></i>;
        if (a.includes('sport'))                                     return <i className={`fa-solid fa-trophy ${size}`}></i>;
        if (a.includes('patrimoine'))                                return <i className={`fa-solid fa-building-columns ${size}`}></i>;
        if (a.includes('epi') || a.includes('vêtement'))            return <i className={`fa-solid fa-shield-halved ${size}`}></i>;
        if (a.includes('menuis') || a.includes('agencement'))       return <i className={`fa-solid fa-hammer ${size}`}></i>;
        if (a.includes('assurance') || a.includes('courtage'))      return <i className={`fa-solid fa-umbrella ${size}`}></i>;
        if (a.includes('sécurité'))                                  return <i className={`fa-solid fa-lock ${size}`}></i>;
        if (a.includes('immobilier') || a.includes('diagnostic'))   return <i className={`fa-solid fa-house ${size}`}></i>;
        if (a.includes('métallique') || a.includes('serrurerie'))   return <i className={`fa-solid fa-wrench ${size}`}></i>;
        if (a.includes('peinture') || a.includes('déco'))           return <i className={`fa-solid fa-palette ${size}`}></i>;
        if (a.includes('commerciale') || a.includes('automobile'))  return <i className={`fa-solid fa-car ${size}`}></i>;
        if (a.includes('justice') || a.includes('huissier'))        return <i className={`fa-solid fa-scale-balanced ${size}`}></i>;
        return <i className={`fa-solid fa-briefcase ${size}`}></i>;
    };

    const formatUrl = (url = '') => {
        if (!url) return '';
        return url.startsWith('http://') || url.startsWith('https://') ? url : `https://${url}`;
    };

    // ─── COMPOSANTS ───────────────────────────────────────────────────────────────
    // Avatar: photo si dispo, sinon dégradé + icône
    const Avatar = ({ contact, size = 'md' }) => {
        const dim = size === 'lg' ? 'w-24 h-24 sm:w-32 sm:h-32' : 'w-12 h-12 sm:w-14 sm:h-14';
        const iconSize = size === 'lg' ? 'text-3xl sm:text-5xl' : 'text-lg sm:text-xl';
        if (contact.avatarUrl) {
            return (
                <div className={`${dim} rounded-full overflow-hidden border-2 border-indigo-100 flex-shrink-0 shadow-inner`}>
                    <img src={contact.avatarUrl} alt={contact.name} className="w-full h-full object-cover" onError={e => { e.target.style.display='none'; }} />
                </div>
            );
        }
        return (
            <div className={`${dim} rounded-full bg-gradient-to-br ${getAvatarGradient(contact.name)} flex items-center justify-center text-white flex-shrink-0 shadow-inner`}>
                {getContactIcon(contact.activity, iconSize)}
            </div>
        );
    };

    // Badge secteur
    const SectorBadge = ({ sector }) => {
        if (!sector) return null;
        return (
            <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-indigo-50 text-indigo-700 border border-indigo-100">
                <i className="fa-solid fa-tag text-[10px]"></i>
                {sector}
            </span>
        );
    };

    // ─── APPLICATION PRINCIPALE ───────────────────────────────────────────────────
    function App() {
        // Firebase
        const [user,         setUser]         = useState(null);
        const [isLoading,    setIsLoading]    = useState(true);
        const [firebaseError,setFirebaseError] = useState('');

        // Données
        const [contacts,        setContacts]        = useState([]);
        const [declarationsCA,  setDeclarationsCA]  = useState([]);

        // UI
        const [searchTerm,          setSearchTerm]          = useState('');
        const [selectedContact,     setSelectedContact]     = useState(null);
        const [isAdmin,             setIsAdmin]             = useState(false);
        const [showLoginModal,      setShowLoginModal]      = useState(false);
        const [loginPassword,       setLoginPassword]       = useState('');
        const [loginError,          setLoginError]          = useState(false);
        const [showAddModal,        setShowAddModal]        = useState(false);
        const [newContact,          setNewContact]          = useState({ ...EMPTY_CONTACT });
        const [showDeclareCAModal,  setShowDeclareCAModal]  = useState(false);
        const [showManageCAModal,   setShowManageCAModal]   = useState(false);
        const [caAmount,            setCaAmount]            = useState('');
        const [caMemberId,          setCaMemberId]          = useState('');

        // ── 1. AUTHENTIFICATION ────────────────────────────────────────────────
        useEffect(() => {
            const authenticate = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    console.error("Auth Firebase:", err);
                    setFirebaseError("Authentification Firebase échouée. Activez la méthode 'Anonyme' dans la console Firebase > Authentication.");
                    setIsLoading(false);
                }
            };
            authenticate();

            const unsub = onAuthStateChanged(auth, (u) => {
                setUser(u);
                if (!u) setIsLoading(false);
            });
            return unsub;
        }, []);

        // ── 2. SYNCHRONISATION FIRESTORE ───────────────────────────────────────
        useEffect(() => {
            if (!user) return;

            // ── Contacts ──
            const contactsCol = colPath('contacts');
            const unsubContacts = onSnapshot(contactsCol,
                (snapshot) => {
                    // BUG FIX: utilisation de 'snap' et non 'doc' pour éviter le conflit
                    // avec la fonction Firestore `doc` importée depuis Firebase.
                    const data = snapshot.docs.map(snap => ({ ...snap.data(), firebaseId: snap.id }));

                    if (data.length === 0 && !window._resexcelSeeded) {
                        // Premier lancement : injection des membres initiaux
                        window._resexcelSeeded = true;
                        Promise.all(
                            initialContacts.map(c => setDoc(docPath('contacts', c.id), c))
                        )
                        .then(() => console.log("[Résexcel] Membres injectés avec succès."))
                        .catch(err => {
                            console.error("[Résexcel] Erreur d'écriture:", err);
                            setFirebaseError("Firebase bloque l'écriture. Mettez à jour vos règles Firestore (onglet 'Rules').");
                            setIsLoading(false);
                        });
                        // Note: isLoading restera true jusqu'au prochain snapshot (après injection)
                    } else {
                        setContacts([...data].sort((a, b) => (a.name || '').localeCompare(b.name || '')));
                        setIsLoading(false);
                    }
                },
                (err) => {
                    console.error("[Résexcel] Lecture contacts:", err);
                    setFirebaseError("Firebase bloque la lecture. Mettez à jour vos règles Firestore (onglet 'Rules').");
                    setIsLoading(false);
                }
            );

            // ── Déclarations CA ──
            const caCol = colPath('ca_declarations');
            const unsubCA = onSnapshot(caCol,
                (snapshot) => {
                    const data = snapshot.docs.map(snap => ({ ...snap.data(), firebaseId: snap.id }));
                    setDeclarationsCA([...data].sort((a, b) => Number(b.id) - Number(a.id)));
                },
                (err) => console.error("[Résexcel] Lecture CA:", err)
            );

            return () => { unsubContacts(); unsubCA(); };
        }, [user]);

        // ── CALCULS ────────────────────────────────────────────────────────────
        const totalCA = useMemo(() =>
            declarationsCA.reduce((sum, d) => sum + Number(d.amount || 0), 0),
            [declarationsCA]
        );

        const filteredContacts = useMemo(() => {
            if (!searchTerm.trim()) return contacts;
            const q = searchTerm.toLowerCase();
            return contacts.filter(c =>
                (c.name     || '').toLowerCase().includes(q) ||
                (c.company  || '').toLowerCase().includes(q) ||
                (c.activity || '').toLowerCase().includes(q) ||
                (c.sector   || '').toLowerCase().includes(q)
            );
        }, [contacts, searchTerm]);

        // ── ACTIONS ADMIN ──────────────────────────────────────────────────────
        const handleLogin = useCallback((e) => {
            e.preventDefault();
            if (loginPassword === 'admin') {
                setIsAdmin(true); setShowLoginModal(false); setLoginPassword(''); setLoginError(false);
            } else {
                setLoginError(true);
            }
        }, [loginPassword]);

        // ── ACTIONS CONTACTS ───────────────────────────────────────────────────
        const handleAddContact = useCallback(async (e) => {
            e.preventDefault();
            if (!user) return;
            const id = Date.now().toString();
            try {
                await setDoc(docPath('contacts', id), { ...newContact, id });
                setShowAddModal(false);
                setNewContact({ ...EMPTY_CONTACT });
            } catch (err) {
                console.error(err);
                alert("Erreur d'ajout. Vérifiez vos règles Firebase.");
            }
        }, [user, newContact]);

        const handleDeleteContact = useCallback(async (id, e) => {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (!user || !id) return;
            if (!window.confirm("Supprimer ce contact pour tout le monde ?")) return;
            try {
                await deleteDoc(docPath('contacts', String(id)));
                if (selectedContact && (selectedContact.firebaseId === id || selectedContact.id === id)) {
                    setSelectedContact(null);
                }
            } catch (err) {
                console.error(err);
                alert("Erreur de suppression. Vérifiez vos règles Firebase.");
            }
        }, [user, selectedContact]);

        // ── ACTIONS CA ─────────────────────────────────────────────────────────
        const handleDeclareCA = useCallback(async (e) => {
            e.preventDefault();
            if (!user || !caAmount || isNaN(caAmount) || !caMemberId) return;
            const member = contacts.find(c => (c.firebaseId || c.id) === caMemberId);
            const id = Date.now().toString();
            try {
                await setDoc(docPath('ca_declarations', id), {
                    id,
                    amount:     Number(caAmount),
                    memberId:   caMemberId,
                    memberName: member ? `${member.name} (${member.company})` : 'Membre inconnu',
                    date:       new Date().toLocaleDateString('fr-FR'),
                });
                setShowDeclareCAModal(false);
                setCaAmount('');
                setCaMemberId('');
            } catch (err) {
                console.error(err);
                alert("Erreur de déclaration. Vérifiez vos règles Firebase.");
            }
        }, [user, caAmount, caMemberId, contacts]);

        const handleDeleteCA = useCallback(async (id, e) => {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (!user || !id) return;
            if (!window.confirm("Supprimer cette déclaration ?")) return;
            try {
                await deleteDoc(docPath('ca_declarations', String(id)));
            } catch (err) {
                console.error(err);
                alert("Erreur de suppression.");
            }
        }, [user]);

        // ── PARTAGE ────────────────────────────────────────────────────────────
        const handleShareContact = useCallback((contact) => {
            const text = `Je te recommande chaleureusement ${contact.name} de l'entreprise ${contact.company} pour son activité : ${contact.activity}. Ses coordonnées : ${contact.phone || 'N/A'} – ${contact.email || 'N/A'}`;
            if (navigator.share) {
                navigator.share({ title: `Recommandation – ${contact.name}`, text })
                    .catch(err => console.log("Partage annulé:", err));
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(text)
                    .then(() => alert("Message copié dans le presse-papier !"))
                    .catch(() => alert("Impossible de copier le message."));
            } else {
                // Fallback ultime
                prompt("Copiez ce texte :", text);
            }
        }, []);

        // ── RENDU ──────────────────────────────────────────────────────────────
        if (isLoading) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                    <p className="text-slate-500 font-medium">Connexion au réseau...</p>
                </div>
            );

                            </div>
                            <div className="px-5 py-3 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                                <button type="button" onClick={() => setShowDeclareCAModal(false)} className="px-5 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:bg-slate-200 border-none cursor-pointer transition-colors">Annuler</button>
                                <button type="submit" form="declareCAForm" className="px-5 py-2.5 rounded-xl text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm border-none cursor-pointer transition-all">Confirmer</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* ── MODAL GESTION DES CA (admin) ───────────────────────────── */}
                {showManageCAModal && isAdmin && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowManageCAModal(false)}>
                        <div className="bg-white rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                            <div className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                <h3 className="text-lg font-bold text-slate-900 flex items-center gap-2 m-0">
                                    <i className="fa-solid fa-list-check text-indigo-600"></i> Historique du CA
                                </h3>
                                <button onClick={() => setShowManageCAModal(false)} className="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm text-slate-400 hover:text-slate-600 border-none cursor-pointer">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                            <div className="p-5 overflow-y-auto flex-1">
                                {declarationsCA.length === 0 ? (
                                    <p className="text-center text-slate-400 py-8">Aucune déclaration enregistrée.</p>
                                ) : (
                                    <div className="space-y-3">
                                        {declarationsCA.map(decl => {
                                            const uid = decl.firebaseId || decl.id;
                                            return (
                                                <div key={uid} className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                                                    <div>
                                                        <p className="font-bold text-slate-900 m-0">{Number(decl.amount || 0).toLocaleString('fr-FR')} €</p>
                                                        <p className="text-xs text-slate-400 m-0 mt-0.5">{decl.memberName} • {decl.date}</p>
                                                    </div>
                                                    <button onClick={e => handleDeleteCA(uid, e)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full border-none bg-transparent cursor-pointer transition-colors" title="Supprimer">
                                                        <i className="fa-solid fa-trash text-sm"></i>
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                )}

                {/* ── MODAL LOGIN ADMIN ──────────────────────────────────────── */}
                {showLoginModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowLoginModal(false)}>
                        <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                            <div className="p-6">
                                <h3 className="text-xl font-bold text-slate-900 mb-1 text-center">Gestion de l'annuaire</h3>
                                <p className="text-sm text-slate-400 text-center mb-5">Accès réservé au gestionnaire</p>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Mot de passe</label>
                                        <input required type="password" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-base transition-colors" placeholder="••••••••" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} autoFocus />
                                        {loginError && <p className="text-red-500 text-xs mt-1.5 font-medium">Mot de passe incorrect.</p>}
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 border-none cursor-pointer text-base shadow-sm transition-colors">
                                        Connexion
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                )}

            </div>
        );
    }

    // ─── POINT D'ENTRÉE ───────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('resexcel-root'));
    root.render(<App />);
</script>

</body>
</html>
